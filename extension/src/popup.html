<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Transcript</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    .container { padding: 16px; }
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #ff4444;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #cc0000; }
    button:disabled { background: #555; cursor: not-allowed; }
    #output {
      margin-top: 12px;
      padding: 12px;
      background: #252525;
      border-radius: 6px;
      max-height: 480px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #output:empty { display: none; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>YouTube Transcript</h1>
    <button id="getTranscript">Get Transcript</button>
    <div id="output"></div>
    <div class="status" id="status">Click the button to fetch transcript</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
